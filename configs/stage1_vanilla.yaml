# Vanilla SSM baseline for Stage 1 (200M tokens on v2 data)
model_type: vanilla_ssm

model_args:
  d_model: 768
  n_layer: 24
  d_intermediate: 0
  ssm_cfg:
    layer: Mamba2
    d_state: 128
    d_conv: 4
    expand: 2
    headdim: 64
  rms_norm: true
  residual_in_fp32: true
  fused_add_norm: false

seq_len: 2048
batch_size: 16
total_tokens: 200000000
lr: 0.0006
weight_decay: 0.1
betas: [0.9, 0.95]
warmup_steps: 512
grad_clip: 1.0
use_amp: true
seed: 42

data_dir: /scratch/gpfs/HENDERSON/zs7353/ssm_ttt/data_cache_v2
num_workers: 4

log_interval: 50
save_interval: 5000
eval_interval: 2000
output_dir: /scratch/gpfs/HENDERSON/zs7353/ssm_ttt/runs/stage1v2_vanilla
